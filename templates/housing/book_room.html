{% extends 'base.html' %}

{% block title %}Book House{% endblock %}

{% block content %}

<div class="auth-page">

    <div class="attachment-form-card">

        <div class="auth-header">
            <h4>Book House</h4>
            <p>Fill in the details to book this house</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert-message alert-{{ message.level_tag }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="post" class="attachment-form">

            {% csrf_token %}

            {{ form.as_p }}

            <div class="attachment-form-actions">

                <button type="submit" class="auth-btn">
                    Confirm Booking
                </button>

                <a href="{% url 'houses_list' %}"
                   class="auth-btn-outline">
                    Cancel
                </a>

            </div>

        </form>

    </div>

</div>

{% endblock %}
