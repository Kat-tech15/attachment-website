{% extends "base.html" %}

{% block content %}

<div class="form-container">
  <h2>Edit House</h2>
  {% if messages %}
        {% for message in messages %}
            {% if "edit_house" in message.tags %}
                <div class="alert alert-{{message.level_tag}}">{{ message }}</div>
            {% endif %}
        {% endfor %}
    {% endif %}
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <div style="display: flex; gap: 10px;">
      <button type="submit" class="btn btn-primary">Update</button>
      <a href="{% url 'landlords_dashboard' %}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
