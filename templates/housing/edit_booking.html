{% extends 'base.html' %}

{% block content %}

<div class="auth-page">

    <div class="attachment-form-card">

        <div class="auth-header">
            <h4>Edit Booking</h4>
            <p>Update your booking details</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                {% if "edit_booking" in message.tags %}
                    <div class="alert-message alert-{{ message.level_tag }}">
                        {{ message }}
                    </div>
                {% endif %}
            {% endfor %}
        {% endif %}

        <form method="post" class="attachment-form">

            {% csrf_token %}

            <div class="attachment-form-group">
                {{ form.as_p }}
            </div>

            <div class="attachment-form-actions">

                <button type="submit" class="auth-btn">
                    Update Booking
                </button>

                <a href="{% url redirect_url %}"
                   class="auth-btn-outline">
                    Cancel
                </a>

            </div>

        </form>

    </div>

</div>

{% endblock %}
