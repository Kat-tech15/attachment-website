{% extends 'base.html'%}
{% block content %}
   <div class="form-container">
    <h3>Post a New House</h3>
    {% if messages %}
        {% for message in messages %}
            {% if "post_house" in message.tags %}
                <div class="alert alert-{{message.level_tag}}">{{ message }}</div>
            {% endif %}
        {% endfor %}
    {% endif %}
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn">Post House</button>
    </form>
   </div>

{% endblock %}
