{% extends 'base.html' %}

{% block content %}

<div class="auth-page">

    <div class="attachment-form-card">

        <div class="auth-header">
            <h4>Post Attachment</h4>
            <p>Create a new attachment opportunity for students and applicants.</p>
        </div>

        <form method="post" enctype="multipart/form-data" class="attachment-form">

            {% csrf_token %}

            <div class="attachment-form-group">
                {{ form.as_p }}
            </div>

            <div class="attachment-form-actions">

                <button type="submit" class="auth-btn">
                    Post Attachment
                </button>

                <a href="{% url 'company_dashboard' %}"
                   class="auth-btn-outline text-center">
                    Cancel
                </a>

            </div>

        </form>

    </div>

</div>

{% endblock %}
