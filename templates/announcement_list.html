{% extends "base.html" %}

{% block title %}Announcements{% endblock %}

{% block content %}

<div class="auth-page">

    <div class="attachment-form-card">

        <div class="auth-header">
            <h4>Announcements</h4>
            <p>Latest updates and notices</p>
        </div>

        <div class="announcement-list">

            {% for ann in announcements %}

                <div class="attachment-opportunity-card">

                    <div class="attachment-title">
                        <a href="{% url 'announcement_detail' ann.id %}">
                            {{ ann.title }}
                        </a>
                    </div>

                    <div class="attachment-description">
                        <small>
                            {{ ann.created_at|date:"M d, Y H:i" }}
                        </small>
                    </div>

                </div>

            {% empty %}

                <div class="attachment-search-card">
                    <p>No announcements yet.</p>
                </div>

            {% endfor %}

        </div>

    </div>

</div>

{% endblock %}
